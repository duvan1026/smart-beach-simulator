version: '3.8'

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - beach-net

  beach-rabbitmq:
    image: rabbitmq:3-management
    container_name: beach-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beach-net

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - beach-net

  sensor-simulator:
    build: ./sensor-simulator
    container_name: sensor-simulator
    ports:
      - "8290:8290"
    environment:
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: beach-sensor-simulator
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8290
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - beach-net

  cep-engine:
    build: ./cep-engine
    container_name: cep-engine
    ports:
      - "8291:8291"
    environment:
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: beach-cep-engine
      SPRING_RABBITMQ_HOST: beach-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8291
    volumes:
      - ./config/event-types.json:/app/config/event-types.json
    depends_on:
      beach-rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - beach-net

  nodered:
    build: ./nodered
    container_name: nodered
    ports:
      - "1880:1880"
    depends_on:
      mosquitto:
        condition: service_started
      beach-rabbitmq:
        condition: service_healthy
    networks:
      - beach-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgadmin4/pgpass:ro
    entrypoint: >
      /bin/sh -c "
      cp /pgadmin4/pgpass /var/lib/pgadmin/pgpass &&
      chmod 600 /var/lib/pgadmin/pgpass &&
      /entrypoint.sh
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - beach-net

volumes:
  pgdata:

networks:
  beach-net:
    driver: bridge
